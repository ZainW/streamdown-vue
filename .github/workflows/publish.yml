name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # Uses npm Trusted Publishing (OIDC) — no token needed.
      # Configure at: https://www.npmjs.com/package/streamdown-vue3/access
      # Add trusted publisher: repo=ZainW/streamdown-vue, workflow=publish.yml
      - name: Publish
        run: pnpm publish --no-git-checks
